<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Top progress bar -->
  <!-- <rect x="56" y="48" width="400" height="20" rx="4" fill="#1a1a1a"/> -->
  <!-- <rect x="56" y="48" width="196" height="20" rx="4" fill="#f5b301"/> -->

  <!-- Bottom progress bar -->
  <!-- <rect x="56" y="444" width="400" height="20" rx="4" fill="#1a1a1a"/> -->
  <!-- <rect x="56" y="444" width="196" height="20" rx="4" fill="#f5b301"/> -->
  
  <!-- Clock face -->
  <circle cx="256" cy="256" r="178" fill="#0f0f0f" stroke="#2a2a2a" stroke-width="32"/>

  <!-- Major ticks (12, 3, 6, 9) -->
  <g stroke="#cfcfcf" stroke-width="16" stroke-linecap="round">
    <line x1="256" y1="102" x2="256" y2="142" transform="rotate(0 256 256)"/>
    <line x1="256" y1="102" x2="256" y2="142" transform="rotate(90 256 256)"/>
    <line x1="256" y1="102" x2="256" y2="142" transform="rotate(180 256 256)"/>
    <line x1="256" y1="102" x2="256" y2="142" transform="rotate(270 256 256)"/>
  </g>

  <!-- Minor ticks -->
  <g stroke="#4a4a4a" stroke-width="7" stroke-linecap="round">
    <line x1="256" y1="112" x2="256" y2="135" transform="rotate(30 256 256)"/>
    <line x1="256" y1="112" x2="256" y2="135" transform="rotate(60 256 256)"/>
    <line x1="256" y1="112" x2="256" y2="135" transform="rotate(120 256 256)"/>
    <line x1="256" y1="112" x2="256" y2="135" transform="rotate(150 256 256)"/>
    <line x1="256" y1="112" x2="256" y2="135" transform="rotate(210 256 256)"/>
    <line x1="256" y1="112" x2="256" y2="135" transform="rotate(240 256 256)"/>
    <line x1="256" y1="112" x2="256" y2="135" transform="rotate(300 256 256)"/>
    <line x1="256" y1="112" x2="256" y2="135" transform="rotate(330 256 256)"/>
  </g>

  <!-- Yellow 45s mark (9 o'clock) -->
  <line x1="256" y1="102" x2="256" y2="142" transform="rotate(270 256 256)" stroke="#f5b301" stroke-width="18" stroke-linecap="round"/>

  <!-- Your original hands - kept exactly the same positions -->
  <!-- Hour hand -->
  <line x1="256" y1="256" x2="256" y2="150" stroke="#ececec" stroke-width="22" stroke-linecap="round" transform="rotate(35 256 256)"/>
  <!-- Minute hand -->
  <line x1="256" y1="256" x2="305" y2="170" stroke="#ececec" stroke-width="14" stroke-linecap="round" transform="rotate(83 256 256)"/>
  <!-- Red second hand -->
  <line x1="256" y1="256" x2="295" y2="105" stroke="#ff3333" stroke-width="8" stroke-linecap="round" transform="rotate(265 256 256)"/>

  <!-- Center -->
  <circle cx="256" cy="256" r="28" fill="#111111"/>
  <circle cx="256" cy="256" r="12" fill="#f5b301"/>
</svg>