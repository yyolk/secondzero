name: Update icons

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  regenerate-icons:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect icon.svg changes
        id: icon-change
        env:
          EVENT_ACTION: ${{ github.event.action }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_ACTION" = "synchronize" ] && [ -n "${BEFORE_SHA:-}" ]; then
            from_sha="$BEFORE_SHA"
          elif [ "$EVENT_ACTION" = "synchronize" ] && git cat-file -e "$HEAD_SHA^" 2>/dev/null; then
            from_sha="$(git rev-parse "$HEAD_SHA^")"
          else
            from_sha="$BASE_SHA"
          fi
          to_sha="$HEAD_SHA"

          if git diff --name-only "$from_sha" "$to_sha" | grep -qx "icon.svg"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "icon.svg changed between $from_sha and $to_sha"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "icon.svg unchanged between $from_sha and $to_sha"
          fi

      - name: Install ImageMagick
        if: steps.icon-change.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Regenerate icons
        if: steps.icon-change.outputs.changed == 'true'
        run: make icons

      - name: Commit updated PNGs
        if: steps.icon-change.outputs.changed == 'true'
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          shopt -s nullglob
          files=(icon-*.png)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No icon PNG files found"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          if git diff --cached --quiet -- "${files[@]}"; then
            echo "No icon changes to commit"
            exit 0
          fi

          git commit -m "chore: regenerate icons from icon.svg"

          max_attempts=3
          for ((attempt=1; attempt<=max_attempts; attempt++)); do
            if git pull --rebase origin "$PR_HEAD_REF" && \
              git push origin HEAD:"$PR_HEAD_REF"; then
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Push attempt $attempt failed, retrying..."
              sleep $((attempt * 2))
            fi
          done

          echo "Failed to update PR branch after $max_attempts attempts"
          exit 1
