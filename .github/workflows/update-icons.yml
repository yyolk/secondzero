name: Update icons

on:
  pull_request:
    paths:
      - icon.svg

permissions:
  contents: write

jobs:
  regenerate-icons:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Regenerate icons
        run: make icons

      - name: Commit updated PNGs
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          shopt -s nullglob
          files=(icon-*.png)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No icon PNG files found"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${files[@]}"
          if git diff --cached --quiet -- "${files[@]}"; then
            echo "No icon changes to commit"
            exit 0
          fi

          git commit -m "chore: regenerate icons from icon.svg"

          max_attempts=3
          for ((attempt=1; attempt<=max_attempts; attempt++)); do
            if git pull --rebase origin "$PR_HEAD_REF" && \
              git push origin HEAD:"$PR_HEAD_REF"; then
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Push attempt $attempt failed, retrying..."
              sleep $((attempt * 2))
            fi
          done

          echo "Failed to update PR branch after $max_attempts attempts"
          exit 1
